<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XOX WiFi P2P</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
h1{color:#58a6ff;margin-bottom:10px;font-size:24px}
#lobby{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:20px}
#lobby button{padding:16px 32px;margin:8px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;width:100%;max-width:300px}
#lobby button:active{background:#2ea043}
#lobby textarea{width:100%;max-width:300px;height:80px;margin:8px;background:#21262d;color:#fff;border:2px solid #30363d;border-radius:8px;padding:8px;font-size:12px}
.small{font-size:12px;color:#8b949e;margin:5px 0;text-align:center}
#status{font-size:18px;margin:15px 0;color:#f0883e;font-weight:bold;min-height:24px;text-align:center}
#board{display:grid;grid-template-columns:repeat(3,90px);grid-template-rows:repeat(3,90px);gap:6px;background:#161b22;padding:6px;border-radius:12px;margin:10px 0}
.cell{width:90px;height:90px;background:#21262d;border:2px solid #30363d;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:bold;cursor:pointer}
.cell:active{background:#30363d}
.cell.x{color:#da3633}
.cell.o{color:#58a6ff}
.cell.disabled{cursor:not-allowed;opacity:0.6}
#youare{color:#f0883e;font-weight:bold}
</style>
</head>
<body>
<div id="lobby">
  <h1>XOX WiFi P2P</h1>
  <div class="small">1. Both phones connect to SAME WiFi hotspot<br>2. One clicks CREATE, other clicks JOIN</div>
  <button id="createBtn">CREATE GAME</button>
  <textarea id="offerText" placeholder="1. Click CREATE GAME\n2. Copy this text\n3. Send to friend via WhatsApp"></textarea>
  <textarea id="answerText" placeholder="Friend pastes their text here, then click JOIN"></textarea>
  <button id="joinBtn">JOIN GAME</button>
</div>

<h1>XOX WiFi</h1>
<div id="status">Connecting...</div>
<div id="board">
  <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
</div>
<div class="small">You are: <span id="youare">-</span></div>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = false;
let myPlayer = "";
let pc, dc;

const statusDiv = document.getElementById('status');
const cells = document.querySelectorAll('.cell');
const youareDiv = document.getElementById('youare');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function updateBoard(){
  cells.forEach((cell,i) => {
    cell.textContent = board[i];
    cell.className = 'cell';
    if(board[i]) cell.classList.add(board[i].toLowerCase());
    if(!gameActive || myPlayer!== currentPlayer || board[i]) cell.classList.add('disabled');
  });
}

function checkWin(){
  return wins.some(c => c.every(i => board[i] === currentPlayer && board[i]!== ""));
}

function handleClick(e){
  if(!gameActive || myPlayer!== currentPlayer) return;
  const i = e.target.dataset.i;
  if(board[i]!== "") return;

  board[i] = currentPlayer;
  dc.send(JSON.stringify({t:'move', i:i, p:currentPlayer}));
  afterMove();
}

function afterMove(){
  updateBoard();
  if(checkWin()){
    statusDiv.textContent = `Player ${currentPlayer} Wins!`;
    gameActive = false;
    setTimeout(resetGame, 2000);
    return;
  }
  if(board.every(c => c!== "")){
    statusDiv.textContent = "Draw!";
    gameActive = false;
    setTimeout(resetGame, 2000);
    return;
  }
  currentPlayer = currentPlayer === "X"? "O" : "X";
  statusDiv.textContent = `Player ${currentPlayer} Turn`;
  updateBoard();
}

function resetGame(){
  board = ["","","","","","","","",""];
  currentPlayer = "X";
  gameActive = true;
  statusDiv.textContent = `Player ${currentPlayer} Turn`;
  updateBoard();
}

function setupConnection(){
  pc.ondatachannel = e => {
    dc = e.channel;
    dc.onopen = startGame;
    dc.onmessage = e => {
      const data = JSON.parse(e.data);
      if(data.t === 'move'){
        board[data.i] = data.p;
        afterMove();
      }
    };
  };
}

function startGame(){
  document.getElementById('lobby').style.display = 'none';
  gameActive = true;
  statusDiv.textContent = `Player ${currentPlayer} Turn`;
  updateBoard();
}

document.getElementById('createBtn').onclick = async () => {
  myPlayer = "X";
  youareDiv.textContent = myPlayer;
  pc = new RTCPeerConnection({iceServers:[]});
  setupConnection();
  dc = pc.createDataChannel("game");
  dc.onopen = startGame;
  dc.onmessage = e => {
    const data = JSON.parse(e.data);
    if(data.t === 'move'){ board[data.i] = data.p; afterMove(); }
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  setTimeout(() => {
    document.getElementById('offerText').value = JSON.stringify(pc.localDescription);
  }, 1000);
};

document.getElementById('joinBtn').onclick = async () => {
  myPlayer = "O";
  youareDiv.textContent = myPlayer;
  pc = new RTCPeerConnection({iceServers:[]});
  setupConnection();
  const offer = JSON.parse(document.getElementById('offerText').value);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  setTimeout(() => {
    document.getElementById('answerText').value = JSON.stringify(pc.localDescription);
    alert('Copy the ANSWER text and send it back to host');
  }, 1000);
};

cells.forEach(c => c.onclick = handleClick);
</script>
</body>
</html>
